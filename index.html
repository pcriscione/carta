<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palhambre – La Princesa &amp; Ramona</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #141008;
      --card:     #1e1810;
      --gold:     #c9a84c;
      --gold-l:   #e8c96a;
      --gold-d:   #7a5e1a;
      --gold-dim: #4a3a14;
      --cream:    #d4c9a8;
      --sep:      #3a2e14;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg);
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(201,168,76,.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(201,168,76,.04) 0%, transparent 60%);
    }
    .top-tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: .85rem;
      color: var(--gold-d);
      letter-spacing: .3em;
      text-transform: uppercase;
      margin-bottom: 32px;
      text-align: center;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      width: 100%;
      max-width: 700px;
    }
    @media (max-width: 500px) {
      .grid { grid-template-columns: 1fr; max-width: 320px; }
    }
    .restaurant-card {
      background: var(--card);
      border: 1px solid var(--gold-dim);
      border-radius: 4px;
      padding: 32px 20px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .restaurant-card img {
      width: 100%;
      max-width: 180px;
      height: 120px;
      object-fit: contain;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gold-dim);
    }
    .divider-diamond {
      width: 6px;
      height: 6px;
      background: var(--gold-d);
      transform: rotate(45deg);
      flex-shrink: 0;
    }
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 12px 16px;
      text-align: center;
      text-decoration: none;
      font-family: 'Lato', sans-serif;
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      border-radius: 2px;
      transition: all .2s;
    }
    .btn-food {
      background: var(--gold);
      color: var(--bg);
      border: 1px solid var(--gold);
    }
    .btn-food:hover { background: var(--gold-l); border-color: var(--gold-l); }
    .btn-drinks {
      background: transparent;
      color: var(--gold);
      border: 1px solid var(--gold-dim);
    }
    .btn-drinks:hover { border-color: var(--gold); background: rgba(201,168,76,.08); }
    footer {
      margin-top: 36px;
      font-size: .72rem;
      color: var(--gold-d);
      letter-spacing: .08em;
      text-align: center;
    }
  </style>
</head>
<body>
  <p class="top-tagline">Selecciona tu restaurante</p>
  <div class="grid">
    <!-- LA PRINCESA -->
    <div class="restaurant-card">
      <img src="logoPrincesa.webp" alt="La Princesa" />
      <div class="divider"><div class="divider-diamond"></div></div>
      <div class="btn-group">
        <a href="palhambre_princesa.html" class="btn btn-food">🍽 Carta de comidas</a>
        <a href="palased_princesa.html" class="btn btn-drinks">🍹 Carta de bebidas</a>
      </div>
    </div>
    <!-- RAMONA -->
    <div class="restaurant-card">
      <img src="logoRamona.webp" alt="Ramona" />
      <div class="divider"><div class="divider-diamond"></div></div>
      <div class="btn-group">
        <a href="ramona-comidas.html" class="btn btn-food">🍽 Carta de comidas</a>
        <a href="ramona-bebidas.html" class="btn btn-drinks">🍹 Carta de bebidas</a>
      </div>
    </div>
  </div>
  <footer>Todos los precios incluyen IVA · Carta sujeta a cambios sin previo aviso</footer>
</body>
</html>
